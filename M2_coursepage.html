<p><strong>KCL is not a rule — it is conservation of charge.</strong></p>
<ul>
<li>Charge cannot accumulate at a node</li>
<li>Sum form: <strong>ΣI = 0</strong>   (entering positive, leaving negative)</li>
<li>Balance form: <strong>I_in = I_out</strong></li>
</ul>
<p><em>Sign convention: entering currents are positive, leaving currents are negative. Or flip both (leaving positive, entering negative) — but never mix them in the same equation.</em></p>

<p>For <em>n</em> nodes: write at most <strong>n − 1</strong> independent KCL equations.</p>
<blockquote>
<p>The last KCL equation is always redundant — it is the negative of all the others combined.</p>

<h2 id="loading-effect--the-voltmeter-changes-the-circuit">Loading Effect — The Voltmeter Changes the Circuit</h2>

<p><strong>The act of measuring changes the thing being measured.</strong></p>
<ul>
<li>The voltmeter has internal resistance R_m — in parallel with R₂</li>
<li>R_eff = R₂ · R_m / (R₂ + R_m) — always smaller than R₂ alone</li>
<li>Divider ratio shifts: output voltage drops below the unloaded value</li>
</ul>
<table>
<thead>
<tr>
<th>R₂</th>
<th>R_m (M2K = 1 MΩ)</th>
<th>Loading error</th>
</tr>
</thead>
<tbody>
<tr>
<td>1 kΩ</td>
<td>1 MΩ</td>
<td>≈ 0.1% — negligible</td>
</tr>
<tr>
<td>100 kΩ</td>
<td>1 MΩ</td>
<td>≈ 9% — significant</td>
</tr>
</tbody>
</table>
<p><em>Accurate to within 1% when R_source &lt; R_meter / 100.</em></p>
</section>

<h2 id="ryh-q3--loading-effect">RYH Q3 — Loading Effect</h2>
<p><strong>RAISE YOUR HAND AS THE OPTIONS ARE CALLED.</strong></p>
<div style="font-size:26px;margin-top:16px;background:#FDF3C8;border-left:4px solid #C99700;padding:14px 20px;font-style:italic;">
"You measure a voltage divider output with a voltmeter. The reading is lower than expected. What is the most likely cause?"
</div>
<ul>
<li data-marpit-fragment="1"><span style="font-size:26px;">A)   The battery voltage is too low</span></li>
<li data-marpit-fragment="2"><span style="font-size:26px;">B)   The voltmeter's internal resistance is loading the circuit</span></li>
<li data-marpit-fragment="3"><span style="font-size:26px;">C)   The resistors are in series instead of parallel</span></li>
<li data-marpit-fragment="4"><span style="font-size:26px;">D)   The voltmeter is measuring the wrong node</span></li>
</ul>
</section>

<h2 id="lab-2--one-of-the-most-important-labs-in-this-course">Lab 2 — One of the Most Important Labs in This Course</h2>
<p><strong>24 pre-lab deliverables. 17 lab deliverables. Every one of them matters.</strong></p>
<p>You are not just verifying equations — you are doing what engineers actually do:</p>
<ul>
<li><strong>Sections 2 &amp; 3</strong> — You will measure voltages and calculate currents. The gap between your prediction and your measurement is not an error. It is tolerance and instrument precision. You will quantify it.</li>
<li><strong>Sections 4 &amp; 5</strong> — Oscilloscope capture and CSV export are the exact skills you will use when the jelly bean scale produces a millivolt signal. Practice them well here.</li>
<li><strong>Loading effect</strong> — all five resistors are below 2.2 kΩ. M2K loading (1 MΩ) is negligible here — but you need to know <em>why</em> before you trust the numbers.</li>
</ul>
<blockquote>
<p>This lab is long. It is long because real measurement requires real care. You have the tools — plan your time to complete the prelab, come prepared to the lab and use your time effectively.</p>
</blockquote>
</section>
